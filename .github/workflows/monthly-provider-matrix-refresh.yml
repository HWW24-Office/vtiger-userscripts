name: Monthly Provider Matrix Refresh

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run monthly matrix check
        run: python scripts/monthly_matrix_refresh.py

      - name: Create pull request if files changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(matrix): monthly provider source check'
          title: 'chore(matrix): monthly provider source check'
          body: |
            This automated monthly job checked provider source pages and updated matrix metadata.

            - Updated `last_checked_at`
            - Updated `source_hash` where source was reachable
            - Marked `source_changed_at` when a source page hash changed

            Please review whether brand/model lists should be manually refreshed based on `source_changed_at`.
          branch: chore/monthly-provider-matrix-refresh
          labels: maintenance
          delete-branch: true
